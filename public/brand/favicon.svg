<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Planète Montessori">
  <!--
    Favicon. Two constraints drove every choice here:

    1. It must survive 16x16. A browser tab renders this smaller than a word,
       so it is built from two shapes and nothing else — no text, no fine
       detail, no gradients. SVG <text> is avoided deliberately: it depends on
       a font being present, which is not guaranteed in a favicon context.

    2. It must carry its own background. The previous icon was the school
       wordmark, which is drawn white-on-transparent for dark grounds — on a
       light browser tab it was invisible. The navy plate is what the app
       already puts behind the logo everywhere else, so the icon now matches
       the lockup used in the sidebar, the login screen and the landing nav.

    The planet reads the school's name rather than abbreviating it.
  -->
  <rect width="64" height="64" rx="14" fill="#133562"/>
  <circle cx="32" cy="30" r="12.5" fill="#ffffff"/>
  <ellipse
    cx="32" cy="32" rx="26" ry="8.5"
    fill="none" stroke="#f1ae2a" stroke-width="5"
    transform="rotate(-24 32 32)"
  />
</svg>
